# Simplified CI for Automatic-Identification-of-Coal-Mines-and-Ores

name: CI

permissions:
  contents: read

env:
  PYTHONFAULTHANDLER: 1

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  Tests:
    timeout-minutes: 60
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.12"]
        torch: [latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      - name: Install requirements
        shell: bash
        run: |
          pip install -e ".[export,solutions]" pytest-cov --extra-index-url https://download.pytorch.org/whl/cpu --index-strategy unsafe-best-match
      - name: Check environment
        run: |
          yolo checks
          pip list
      - name: Pytest tests
        shell: bash
        run: pytest --cov=ultralytics/ --cov-report=xml tests/
